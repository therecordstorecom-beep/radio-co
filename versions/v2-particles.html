<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>(radio)</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    canvas#ripple-field {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .center {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      user-select: none;
      pointer-events: none;
    }

    .logo-wrap {
      position: relative;
      width: 420px;
      max-width: 80vw;
    }

    .logo-wrap img {
      width: 100%;
      display: block;
      position: relative;
      z-index: 2;
      mix-blend-mode: multiply;
    }

    .glitch-clone {
      position: absolute;
      inset: 0;
      width: 100%;
      background: url('./logo.jpg') center / contain no-repeat;
      z-index: 3;
      opacity: 0;
      pointer-events: none;
    }

    .subtitle {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.35em;
      text-transform: lowercase;
      color: #000;
      display: flex;
      align-items: center;
      gap: 6px;
      height: 18px;
      min-width: 200px;
      justify-content: center;
    }

    .sub-word {
      display: inline-block;
      overflow: hidden;
      white-space: nowrap;
      width: 0;
      opacity: 0;
    }

    .sub-arrow {
      display: inline-block;
      opacity: 0;
      font-size: 10px;
      letter-spacing: 0;
    }
  </style>
</head>
<body>
  <canvas id="ripple-field"></canvas>

  <div class="center">
    <div class="logo-wrap" id="logoWrap">
      <img src="./logo.jpg" alt="(radio)" id="logo">
      <div class="glitch-clone" id="glitch1"></div>
      <div class="glitch-clone" id="glitch2"></div>
    </div>

    <div class="subtitle" id="subtitle">
      <span class="sub-word" id="word-receive">receive</span>
      <span class="sub-arrow" id="word-arrow">→</span>
      <span class="sub-word" id="word-transmit">transmit</span>
    </div>
  </div>

  <script>
    const logoImg = document.getElementById('logo');

    // ──────────────────────────────
    // SUBTLE 3D TILT RIPPLE DOT FIELD
    // ──────────────────────────────
    const canvas = document.getElementById('ripple-field');
    const ctx = canvas.getContext('2d');
    let W, H;

    const GRID_SPACING = 14;
    const BASE_DOT_SIZE = 0.1;
    const MAX_DOT_SIZE = 1.2;       // Cap on dot expansion
    const BASE_OPACITY = 0.12;
    const TILT = 0.65;               // Heavy 3D tilt — floor perspective
    const PERSPECTIVE = 500;          // Close camera for strong depth

    let cols, rows;
    let gridPoints = [];
    let ripples = [];

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      buildGrid();
    }

    function buildGrid() {
      gridPoints = [];
      const extent = Math.max(W, H) * 1.3;
      cols = Math.ceil(extent / GRID_SPACING);
      rows = Math.ceil(extent / GRID_SPACING);

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          gridPoints.push({
            wx: (c - cols / 2) * GRID_SPACING,
            wy: (r - rows / 2) * GRID_SPACING,
          });
        }
      }
    }

    resize();
    window.addEventListener('resize', resize);

    // Project with subtle tilt
    function project(wx, wy, wz) {
      const screenX = wx;
      const screenY = wy * (1 - TILT) + wy * TILT * 0.6 - wz * 0.5;
      const depth = PERSPECTIVE + wy * TILT * 0.3;
      const scale = PERSPECTIVE / Math.max(depth, 200);
      return {
        x: W / 2 + screenX * scale,
        y: H / 2 + screenY * scale,
        scale: scale,
      };
    }

    // ── Ripple: Ring (fast, disappears quickly) ──
    class RippleRing {
      constructor(wx, wy) {
        this.cwx = wx; this.cwy = wy;
        this.radius = 0;
        this.speed = 1.8 + Math.random() * 0.8;
        this.ringWidth = 40 + Math.random() * 30;
        this.strength = 0.5 + Math.random() * 0.3;
        this.maxRadius = Math.max(W, H) * 0.8;
        this.alive = true;
      }
      update() {
        this.radius += this.speed;
        this.strength *= 0.995;
        if (this.radius > this.maxRadius || this.strength < 0.05) this.alive = false;
      }
      getInfluence(wx, wy) {
        const dist = Math.hypot(wx - this.cwx, wy - this.cwy);
        const edge = Math.abs(dist - this.radius);
        if (edge < this.ringWidth) {
          const t = 1 - edge / this.ringWidth;
          const wave = Math.sin(t * Math.PI) * this.strength;
          const angle = Math.atan2(wy - this.cwy, wx - this.cwx);
          return {
            dx: Math.cos(angle) * wave * 3,
            dy: Math.sin(angle) * wave * 3,
            dz: wave * 20,
            size: wave * 0.8,
            opacity: wave * 0.35,
          };
        }
        return null;
      }
    }

    // ── Ripple: Wave (concentric sine, slower) ──
    class RippleWave {
      constructor(wx, wy) {
        this.cwx = wx; this.cwy = wy;
        this.phase = 0;
        this.speed = 0.5 + Math.random() * 0.3;
        this.wavelength = 35 + Math.random() * 25;
        this.amplitude = 0.8 + Math.random() * 0.4;
        this.reach = 0;
        this.maxReach = Math.max(W, H) * 0.7;
        this.alive = true;
      }
      update() {
        this.phase += this.speed;
        this.reach += this.speed * 5;      // Expand fast → short animation
        // Keep amplitude strong, only fade in last 20% of life
        const lifeRatio = this.reach / this.maxReach;
        this.currentAmp = lifeRatio > 0.8 
          ? this.amplitude * (1 - (lifeRatio - 0.8) / 0.2)  // fade out at end
          : this.amplitude;
        if (this.reach > this.maxReach) this.alive = false;
      }
      getInfluence(wx, wy) {
        const dist = Math.hypot(wx - this.cwx, wy - this.cwy);
        if (dist > this.reach || dist < 1) return null;
        const edgeFade = 1 - Math.max(0, (dist - this.reach + 60)) / 60;
        const distFade = 1 / (1 + dist * 0.003);
        const wave = Math.sin((dist / this.wavelength) * Math.PI * 2 - this.phase) * this.currentAmp * distFade * Math.min(edgeFade, 1);
        const angle = Math.atan2(wy - this.cwy, wx - this.cwx);
        return {
          dx: Math.cos(angle) * wave * 4,
          dy: Math.sin(angle) * wave * 4,
          dz: wave * 10,
          size: Math.abs(wave) * 0.8,
          opacity: Math.abs(wave) * 0.35,
        };
      }
    }

    function createRipple(x, y) {
      // Iterative inverse projection — find world coords that project to click position
      // Start with rough estimate, then refine
      let wx = x - W / 2;
      let wy = (y - H / 2);
      
      for (let i = 0; i < 5; i++) {
        const proj = project(wx, wy, 0);
        const errX = x - proj.x;
        const errY = y - proj.y;
        wx += errX / proj.scale;
        wy += errY / proj.scale / (1 - TILT + TILT * 0.6);
      }
      
      return Math.random() < 0.5 ? new RippleRing(wx, wy) : new RippleWave(wx, wy);
    }

    // First ripples on load — immediate
    ripples.push(new RippleWave(0, 0));
    setTimeout(() => {
      ripples.push(new RippleRing(
        (Math.random() - 0.5) * W * 0.4,
        (Math.random() - 0.5) * H * 0.4
      ));
    }, 1500);

    // Auto ripples — every 5-8s, max 2 alive
    function scheduleAutoRipple() {
      setTimeout(() => {
        if (ripples.length < 2) {
          const wx = (Math.random() - 0.5) * W * 0.7;
          const wy = (Math.random() - 0.5) * H * 0.7;
          ripples.push(Math.random() < 0.5 ? new RippleRing(wx, wy) : new RippleWave(wx, wy));
        }
        scheduleAutoRipple();
      }, 5000 + Math.random() * 3000);
    }
    scheduleAutoRipple();

    // Click to ripple
    document.addEventListener('click', (e) => {
      ripples.push(createRipple(e.clientX, e.clientY));
    });

    function animate() {
      ctx.clearRect(0, 0, W, H);

      ripples = ripples.filter(r => r.alive);
      for (const r of ripples) r.update();

      ctx.fillStyle = '#000';

      for (const pt of gridPoints) {
        let dx = 0, dy = 0, dz = 0, sizeBoost = 0, opBoost = 0;

        for (const r of ripples) {
          const inf = r.getInfluence(pt.wx, pt.wy);
          if (inf) {
            dx += inf.dx;
            dy += inf.dy;
            dz += inf.dz;
            sizeBoost += inf.size;
            opBoost += inf.opacity;
          }
        }

        const proj = project(pt.wx + dx, pt.wy + dy, dz);

        if (proj.x < -5 || proj.x > W + 5 || proj.y < -5 || proj.y > H + 5) continue;

        const dotR = Math.min(
          Math.max((BASE_DOT_SIZE + sizeBoost) * proj.scale, 0.1),
          MAX_DOT_SIZE
        );
        const opacity = Math.min(BASE_OPACITY + opBoost, 0.55);

        ctx.globalAlpha = opacity;
        ctx.beginPath();
        ctx.arc(proj.x, proj.y, dotR, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.globalAlpha = 1;
      requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);

    // ──────────────────────────────
    // SUBTITLE
    // ──────────────────────────────
    const receive = document.getElementById('word-receive');
    const arrowEl = document.getElementById('word-arrow');
    const transmit = document.getElementById('word-transmit');
    const CHAR_DELAY = 60, HOLD_MS = 1800, GLITCH_OUT_MS = 300, GAP_MS = 600;

    function typeIn(el, text, cd = CHAR_DELAY) {
      return new Promise(resolve => {
        el.style.opacity = '1'; let i = 0;
        const tick = () => {
          el.textContent = text.slice(0, i + 1); el.style.width = 'auto'; i++;
          if (i < text.length) setTimeout(tick, cd + (Math.random() * 30 - 15));
          else resolve();
        };
        setTimeout(tick, 0);
      });
    }

    function glitchOut(el) {
      return new Promise(resolve => {
        const C = '█▓▒░╳×#@!─'; const orig = el.textContent; let s = 4;
        const tick = () => {
          if (s <= 0) { el.style.opacity = '0'; el.textContent = ''; el.style.width = '0'; resolve(); return; }
          el.textContent = orig.split('').map(() => C[Math.floor(Math.random() * C.length)]).join('');
          s--; setTimeout(tick, GLITCH_OUT_MS / 4);
        };
        tick();
      });
    }

    function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

    function flickerIn(el) {
      return new Promise(resolve => {
        let t = 0; const steps = [0, 1, 0, 1, 0, 1];
        const tick = () => {
          if (t >= steps.length) { el.style.opacity = '1'; resolve(); return; }
          el.style.opacity = steps[t]; t++; setTimeout(tick, 80);
        };
        tick();
      });
    }

    async function runSubtitle() {
      while (true) {
        receive.style.opacity = '0'; receive.style.width = '0'; receive.textContent = '';
        arrowEl.style.opacity = '0';
        transmit.style.opacity = '0'; transmit.style.width = '0'; transmit.textContent = '';
        await wait(GAP_MS);
        await typeIn(receive, 'receive'); await wait(400);
        await flickerIn(arrowEl); await wait(200);
        await typeIn(transmit, 'transmit'); await wait(HOLD_MS);
        await Promise.all([
          glitchOut(transmit), glitchOut(receive),
          new Promise(r => { setTimeout(() => { arrowEl.style.opacity = '0'; r(); }, GLITCH_OUT_MS / 2); })
        ]);
        await wait(GAP_MS);
      }
    }

    // ──────────────────────────────
    // LOGO GLITCH
    // ──────────────────────────────
    const g1 = document.getElementById('glitch1');
    const g2 = document.getElementById('glitch2');
    function rb(a, b) { return a + Math.random() * (b - a); }

    function doGlitchBurst() {
      const dur = rb(80, 180);
      const y1s = Math.random() * 80, y1e = y1s + rb(5, 25);
      g1.style.clipPath = `polygon(0 ${y1s}%, 100% ${y1s}%, 100% ${y1e}%, 0 ${y1e}%)`;
      g1.style.transform = `translateX(${rb(-8, 8)}px)`; g1.style.opacity = '0.85';
      const y2s = Math.random() * 80, y2e = y2s + rb(3, 15);
      g2.style.clipPath = `polygon(0 ${y2s}%, 100% ${y2s}%, 100% ${y2e}%, 0 ${y2e}%)`;
      g2.style.transform = `translateX(${rb(-6, 6)}px)`; g2.style.opacity = '0.7';
      logoImg.style.filter = `contrast(${rb(0.9, 1.15)})`;
      setTimeout(() => { g1.style.opacity = '0'; g2.style.opacity = '0'; logoImg.style.filter = ''; }, dur);
      setTimeout(doGlitchBurst, rb(2000, 8000));
    }

    window.addEventListener('load', () => { runSubtitle(); setTimeout(doGlitchBurst, 1200); });
  </script>
</body>
</html>
