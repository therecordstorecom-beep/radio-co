<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MYO_ | (radio)</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; min-height: 100vh;
      background: #ffffff;
      font-family: 'Space Mono', monospace;
      color: #000;
    }

    /* ── NAV ── */
    nav {
      display: flex; align-items: center; justify-content: center;
      padding: 16px 32px;
    }
    nav a {
      color: #000; text-decoration: none;
      font-weight: 700; font-size: 14px; letter-spacing: 0.1em;
    }
    nav a:hover { opacity: 0.5; }

    /* ── HERO ── */
    .hero {
      max-width: 1100px;
      margin: 0 auto;
      padding: 80px 32px 60px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .hero-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.3;
    }

    .hero-sub {
      font-size: 11px;
      line-height: 1.8;
      color: #666;
      max-width: 400px;
    }

    .hero-cta {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: lowercase;
      color: #999;
      text-decoration: none;
      transition: color 0.2s;
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .hero-cta:hover { color: #000; }
    .hero-cta .arrow {
      font-size: 14px;
      line-height: 1;
    }

    /* ── SYSTEM BOX ── */
    .system-box {
      max-width: 1100px;
      margin: 0 auto 80px;
      padding: 0 32px;
    }

    .system-inner {
      background: #f0efed;
      background-image:
        linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      background-position: center center;
      border-radius: 16px;
      padding: 48px;
    }

    @media (max-width: 600px) {
      .system-inner { padding: 24px 16px; }
      .hero-title { font-size: 22px; }
    }

    /* ── PRODUCT GRID ── */
    .products {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    @media (max-width: 800px) {
      .products { grid-template-columns: 1fr; }
    }

    .product-card {
      background: #ffffff;
      border-radius: 12px;
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.3s, transform 0.3s;
      min-height: 300px;
    }
    .product-card:hover {
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      transform: translateY(-2px);
    }

    /* Empty placeholder cards */
    .product-card.empty {
      background: rgba(255,255,255,0.4);
      cursor: default;
    }
    .product-card.empty:hover {
      box-shadow: none;
      transform: none;
    }
    .product-card.empty .card-name {
      color: #ccc;
    }
    .product-card.empty .card-icon svg {
      opacity: 0.1;
    }

    .card-icon {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 0;
    }

    .card-name {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.1em;
    }
    .card-desc {
      font-size: 11px;
      line-height: 1.8;
      color: #999;
    }
    .card-link {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #000;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    /* ── ANIMATED PULSE ICON ── */
    @keyframes pulse-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .pulse-icon .shape-circle {
      animation: pulse-float 3s ease-in-out infinite;
    }
    .pulse-icon .shape-triangle {
      animation: pulse-float 3s ease-in-out 0.3s infinite;
    }
    .pulse-icon .shape-square {
      animation: pulse-float 3s ease-in-out 0.6s infinite;
    }
  </style>
</head>
<body>

  <nav>
    <a href="/">(radio)</a>
  </nav>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-title">Make your own object.</div>
    <div class="hero-sub">Design your own ceramic form with simple controls, then bring it into reality.</div>
    <a href="#system" class="hero-cta">
      enter the system
      <span class="arrow">v</span>
    </a>
  </div>

  <!-- SYSTEM BOX -->
  <div class="system-box" id="system">
    <div class="system-inner">
      <div class="products">

        <!-- PULSE — REMOVE pointer-events:none, opacity, AND coming-soon span WHEN GOING LIVE -->
        <div class="product-card" style="pointer-events:none; opacity:0.6; position:relative;">
          <span style="position:absolute; top:16px; left:32px; font-size:9px; letter-spacing:0.2em; text-transform:uppercase; color:#999;">coming soon</span>
          <div class="card-icon">
            <svg class="pulse-icon" viewBox="0 0 120 160" width="100" height="140" fill="#000" stroke="none">
              <g class="shape-circle">
                <circle cx="60" cy="132" r="22"/>
              </g>
              <g class="shape-triangle">
                <polygon points="60,72 82,110 38,110"/>
              </g>
              <g class="shape-square">
                <rect x="38" y="28" width="44" height="44"/>
              </g>
            </svg>
          </div>
          <div>
            <div class="card-name">PULSE</div>
            <p class="card-desc">Three forms, one vessel.</p>
          </div>
          <span class="card-link" style="color:#ccc;">start making your own -></span>
        </div>

        <!-- Empty placeholder -->
        <div class="product-card empty">
          <div class="card-icon">
            <svg viewBox="0 0 80 80" width="60" height="60" fill="none" stroke="#000" stroke-width="1">
              <line x1="40" y1="20" x2="40" y2="60"/>
              <line x1="20" y1="40" x2="60" y2="40"/>
            </svg>
          </div>
          <div>
            <div class="card-name">---</div>
          </div>
        </div>

        <!-- Empty placeholder -->
        <div class="product-card empty">
          <div class="card-icon">
            <svg viewBox="0 0 80 80" width="60" height="60" fill="none" stroke="#000" stroke-width="1">
              <line x1="40" y1="20" x2="40" y2="60"/>
              <line x1="20" y1="40" x2="60" y2="40"/>
            </svg>
          </div>
          <div>
            <div class="card-name">---</div>
          </div>
        </div>

      </div>
    </div>
  </div>

</body>
</html>
