<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MYO_ | (radio)</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; min-height: 100vh;
      background: #f0efed;
      background-image:
        linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      background-position: center center;
      font-family: 'Space Mono', monospace;
      color: #000;
    }

    /* ── NAV ── */
    nav {
      display: flex; align-items: center; justify-content: center;
      padding: 16px 32px;
    }
    nav a {
      color: #000; text-decoration: none;
      font-weight: 700; font-size: 14px; letter-spacing: 0.1em;
    }
    nav a:hover { opacity: 0.5; }

    /* ── LAYOUT ── */
    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 60px 32px 120px;
    }

    /* ── HEADER ROW ── */
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 48px;
      margin-bottom: 48px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.3;
    }

    .header-desc {
      font-size: 11px;
      line-height: 1.8;
      color: #999;
      max-width: 260px;
      text-align: right;
      padding-top: 6px;
    }

    @media (max-width: 600px) {
      .header-row { flex-direction: column; gap: 16px; }
      .header-desc { text-align: left; max-width: none; }
    }

    /* ── PRODUCT CARDS ── */
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .product-card {
      background: #ffffff;
      border-radius: 16px;
      padding: 40px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.3s, transform 0.3s;
      min-height: 380px;
    }
    .product-card:hover {
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      transform: translateY(-2px);
    }

    /* Icon area */
    .card-icon {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 0;
    }

    /* Card text */
    .card-name {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.1em;
    }
    .card-desc {
      font-size: 11px;
      line-height: 1.8;
      color: #999;
    }
    .card-link {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #000;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    /* ── ANIMATED PULSE ICON — gentle float, shapes stay touching ── */
    @keyframes pulse-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .pulse-icon .shape-circle {
      animation: pulse-float 3s ease-in-out infinite;
    }
    .pulse-icon .shape-triangle {
      animation: pulse-float 3s ease-in-out 0.3s infinite;
    }
    .pulse-icon .shape-square {
      animation: pulse-float 3s ease-in-out 0.6s infinite;
    }
  </style>
</head>
<body>

  <nav>
    <a href="/">(radio)</a>
  </nav>

  <div class="page">
    <div class="header-row">
      <div class="header">
        <h1>MYO_</h1>
      </div>
      <div class="header-desc">
        it's a system.
      </div>
    </div>

    <!-- REMOVE THIS BANNER WHEN GOING LIVE -->
    <div style="font-size:9px; letter-spacing:0.2em; text-transform:uppercase; color:#999; margin-bottom:32px;">coming soon</div>

    <div class="products">
      <!-- REMOVE pointer-events:none AND opacity WHEN GOING LIVE -->
      <div class="product-card" style="pointer-events:none; opacity:0.6;">
        <div class="card-icon">
          <svg class="pulse-icon" viewBox="0 0 120 160" width="120" height="160" fill="#000" stroke="none">
            <g class="shape-circle">
              <circle cx="60" cy="132" r="22"/>
            </g>
            <g class="shape-triangle">
              <polygon points="60,72 82,110 38,110"/>
            </g>
            <g class="shape-square">
              <rect x="38" y="28" width="44" height="44"/>
            </g>
          </svg>
        </div>
        <div>
          <div class="card-name">PULSE</div>
          <p class="card-desc">Three forms, one vessel.</p>
        </div>
        <span class="card-link" style="color:#ccc;">start making your own -></span>
      </div>
    </div>
  </div>

</body>
</html>
