<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☉ Ra 書塔 × Atlas of Voices — Knowledge Navigation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1b2e;
  --bg2: #142236;
  --bg3: #193153;
  --gold: #F9D4E0;
  --gold-dim: #c4a0ad;
  --text: #e0dfe6;
  --text-dim: #7a8da5;
  --accent: #0B5777;
  --free: #0B5777;
  --paid: #EB96FF;
  --border: #1e3350;
  --pink: #EB96FF;
  --peach: #F9D4E0;
  --teal: #0B5777;
  --deep: #193153;
  --glass: rgba(255,255,255,0.04);
  --glass-border: rgba(255,255,255,0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: linear-gradient(170deg, #0a1220 0%, #0f1b2e 20%, #151a35 40%, #1a1a3d 55%, #261a40 70%, #2d1845 85%, #1a1030 100%);
  background-attachment: fixed;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  line-height: 1.7;
  min-height: 100vh;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--gold-dim); }

a { color: var(--peach); text-decoration: none; transition: color 0.2s; }
a:hover { color: var(--pink); }

/* ===== HERO ===== */
.hero {
  text-align: center;
  padding: 70px 20px 40px;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  bottom: -40%;
  left: 20%;
  width: 60%;
  height: 80%;
  background: radial-gradient(ellipse, rgba(235,150,255,0.08) 0%, rgba(140,80,200,0.03) 50%, transparent 70%);
  pointer-events: none;
}
.hero h1 {
  font-family: 'Noto Serif TC', serif;
  font-size: 2.2em;
  color: var(--pink);
  letter-spacing: 0.1em;
  margin-bottom: 10px;
  text-shadow: 0 0 40px rgba(235,150,255,0.2);
}
.hero .subtitle {
  color: var(--text-dim);
  font-size: 0.92em;
  max-width: 600px;
  margin: 0 auto 14px;
  font-style: italic;
}
.hero .author {
  color: var(--gold-dim);
  font-size: 0.85em;
}

/* ===== STATS BAR ===== */
.stats-bar {
  display: flex;
  justify-content: center;
  gap: 24px;
  padding: 14px 20px;
  max-width: 700px;
  margin: 0 auto 10px;
  flex-wrap: wrap;
}
.stat {
  text-align: center;
  font-size: 0.8em;
  color: var(--text-dim);
}
.stat .num {
  display: block;
  font-size: 1.6em;
  font-weight: 600;
  color: var(--peach);
  line-height: 1.2;
}

/* ===== NAV TABS ===== */
.nav-tabs {
  display: flex;
  justify-content: center;
  gap: 6px;
  padding: 10px 16px;
  max-width: 800px;
  margin: 0 auto 8px;
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(15,27,46,0.85);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--glass-border);
  flex-wrap: wrap;
}
.nav-tabs button {
  background: transparent;
  color: var(--text-dim);
  border: 1px solid transparent;
  padding: 9px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.85em;
  transition: all 0.2s;
  font-family: 'Inter', sans-serif;
  white-space: nowrap;
}
.nav-tabs button:hover {
  color: var(--pink);
  background: rgba(235,150,255,0.06);
}
.nav-tabs button.active {
  color: var(--pink);
  border-color: rgba(235,150,255,0.3);
  background: rgba(235,150,255,0.1);
}

/* ===== SEARCH BAR ===== */
.search-wrap {
  max-width: 700px;
  margin: 16px auto;
  padding: 0 16px;
}
.search-box {
  position: relative;
}
.search-box input {
  width: 100%;
  padding: 14px 18px 14px 44px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  color: var(--text);
  font-size: 0.95em;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  font-family: 'Inter', sans-serif;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.search-box input::placeholder { color: var(--text-dim); }
.search-box input:focus {
  border-color: rgba(235,150,255,0.4);
  box-shadow: 0 0 20px rgba(235,150,255,0.08);
}
.search-icon {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
  font-size: 1em;
  pointer-events: none;
}
.search-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 4px 0;
  font-size: 0.75em;
  color: var(--text-dim);
}
.filter-pills {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.filter-pill {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  color: var(--text-dim);
  padding: 3px 10px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 0.9em;
  transition: all 0.2s;
  font-family: 'Inter', sans-serif;
}
.filter-pill:hover, .filter-pill.active {
  color: var(--pink);
  border-color: rgba(235,150,255,0.3);
  background: rgba(235,150,255,0.08);
}

/* ===== CONTENT AREA ===== */
.content {
  max-width: 900px;
  margin: 0 auto;
  padding: 10px 16px 60px;
}
.view { display: none; }
.view.active { display: block; }

/* ===== POST CARDS ===== */
.post-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  transition: background 0.15s;
  cursor: pointer;
}
.post-item:hover {
  background: rgba(235,150,255,0.03);
}
.post-date {
  color: var(--text-dim);
  font-size: 0.72em;
  min-width: 68px;
  padding-top: 3px;
  white-space: nowrap;
}
.post-body { flex: 1; min-width: 0; }
.post-title {
  font-size: 0.88em;
  color: var(--text);
  line-height: 1.5;
  word-break: break-word;
}
.post-title .copy-tag {
  color: var(--text-dim);
  font-size: 0.8em;
  opacity: 0.6;
}
.post-meta-line {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-top: 4px;
  font-size: 0.72em;
  flex-wrap: wrap;
}
.badge {
  padding: 1px 8px;
  border-radius: 10px;
  font-size: 0.9em;
  font-weight: 600;
}
.badge-free { background: rgba(11,87,119,0.3); color: #5fb8d4; }
.badge-paid { background: rgba(235,150,255,0.15); color: var(--pink); }
.domain-tag {
  color: var(--gold-dim);
  font-size: 0.95em;
}
.word-count { color: var(--text-dim); }

/* ===== DOMAIN SECTIONS ===== */
.domain-section {
  margin-bottom: 20px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 14px;
  overflow: hidden;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.domain-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 20px;
  cursor: pointer;
  transition: background 0.15s;
  user-select: none;
}
.domain-header:hover { background: rgba(235,150,255,0.04); }
.domain-code {
  font-family: 'Inter', sans-serif;
  font-size: 0.7em;
  font-weight: 600;
  color: var(--pink);
  background: rgba(235,150,255,0.12);
  padding: 3px 10px;
  border-radius: 6px;
  letter-spacing: 0.1em;
}
.domain-name {
  font-family: 'Noto Serif TC', serif;
  font-size: 1em;
  color: var(--peach);
  flex: 1;
}
.domain-name-en {
  font-family: 'Inter', sans-serif;
  font-size: 0.75em;
  color: var(--text-dim);
  margin-left: 6px;
}
.domain-count {
  font-size: 0.75em;
  color: var(--text-dim);
}
.domain-chevron {
  color: var(--text-dim);
  transition: transform 0.2s;
  font-size: 0.8em;
}
.domain-section.open .domain-chevron { transform: rotate(90deg); }
.domain-posts { display: none; }
.domain-section.open .domain-posts { display: block; }

/* ===== LOAD MORE ===== */
.load-more {
  text-align: center;
  padding: 20px;
}
.load-more button {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  color: var(--gold-dim);
  padding: 10px 32px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.85em;
  transition: all 0.2s;
  font-family: 'Inter', sans-serif;
}
.load-more button:hover {
  border-color: rgba(235,150,255,0.3);
  color: var(--pink);
  background: rgba(235,150,255,0.06);
}

/* ===== SERIES VIEW ===== */
.series-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
}
.series-card {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 14px;
  padding: 20px;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  transition: border-color 0.2s, transform 0.15s;
}
.series-card:hover {
  border-color: rgba(235,150,255,0.2);
  transform: translateY(-2px);
}
.series-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 1em;
  color: var(--peach);
  margin-bottom: 6px;
  line-height: 1.4;
}
.series-meta {
  font-size: 0.75em;
  color: var(--text-dim);
  margin-bottom: 12px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.series-posts-list {
  list-style: none;
  max-height: 280px;
  overflow-y: auto;
}
.series-posts-list li {
  padding: 6px 0;
  border-top: 1px solid rgba(255,255,255,0.04);
  font-size: 0.8em;
}
.series-posts-list li:first-child { border-top: none; }
.series-posts-list li a {
  color: var(--text);
  display: flex;
  gap: 6px;
  align-items: flex-start;
}
.series-posts-list li a:hover { color: var(--pink); }
.series-num {
  color: var(--text-dim);
  min-width: 22px;
  font-size: 0.9em;
}
.collapse-btn {
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 0.75em;
  margin-top: 6px;
  padding: 4px 8px;
  font-family: 'Inter', sans-serif;
}
.collapse-btn:hover { color: var(--pink); }

/* ===== TOPIC MAP ===== */
.topic-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 14px;
}
.topic-card {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 14px;
  padding: 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.topic-card:hover {
  border-color: rgba(235,150,255,0.25);
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(235,150,255,0.08);
}
.topic-card.active {
  border-color: rgba(235,150,255,0.4);
  background: rgba(235,150,255,0.08);
}
.topic-code {
  font-size: 0.7em;
  font-weight: 600;
  color: var(--pink);
  letter-spacing: 0.15em;
  margin-bottom: 6px;
}
.topic-zh {
  font-family: 'Noto Serif TC', serif;
  font-size: 1.05em;
  color: var(--peach);
  margin-bottom: 2px;
}
.topic-en {
  font-size: 0.72em;
  color: var(--text-dim);
  margin-bottom: 8px;
}
.topic-count {
  font-size: 0.7em;
  color: var(--gold-dim);
}
.topic-detail {
  margin-top: 20px;
}
.topic-detail-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.topic-detail-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 1.1em;
  color: var(--peach);
}
.topic-back {
  background: none;
  border: 1px solid var(--glass-border);
  color: var(--text-dim);
  padding: 5px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.78em;
  transition: all 0.2s;
  font-family: 'Inter', sans-serif;
}
.topic-back:hover {
  color: var(--pink);
  border-color: rgba(235,150,255,0.3);
}
.topic-volumes {
  margin-bottom: 16px;
}
.topic-volumes h4 {
  font-size: 0.8em;
  color: var(--gold-dim);
  margin-bottom: 6px;
}
.volume-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  list-style: none;
}
.volume-list li {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  padding: 3px 10px;
  border-radius: 6px;
  font-size: 0.72em;
  color: var(--text-dim);
}

/* ===== READING PATHS ===== */
.path-card {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 14px;
  padding: 24px;
  margin-bottom: 16px;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.path-level {
  font-size: 0.7em;
  font-weight: 600;
  color: var(--pink);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.path-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 1.15em;
  color: var(--peach);
  margin-bottom: 6px;
}
.path-desc {
  font-size: 0.82em;
  color: var(--text-dim);
  margin-bottom: 14px;
  line-height: 1.6;
}
.path-steps {
  list-style: none;
  counter-reset: step;
}
.path-steps li {
  counter-increment: step;
  padding: 10px 0 10px 36px;
  border-left: 2px solid var(--border);
  margin-left: 12px;
  position: relative;
  font-size: 0.82em;
}
.path-steps li::before {
  content: counter(step);
  position: absolute;
  left: -12px;
  top: 10px;
  width: 22px;
  height: 22px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.8em;
  color: var(--pink);
  font-weight: 600;
}
.path-steps li a { color: var(--peach); }
.path-steps li a:hover { color: var(--pink); }
.path-step-domain {
  font-size: 0.85em;
  color: var(--text-dim);
}

/* ===== FOOTER ===== */
.footer {
  text-align: center;
  padding: 40px 20px 30px;
  color: var(--text-dim);
  font-size: 0.75em;
  border-top: 1px solid rgba(255,255,255,0.04);
  max-width: 900px;
  margin: 0 auto;
}
.footer a { color: var(--gold-dim); }

/* ===== EMPTY STATE ===== */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
  font-size: 0.9em;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 600px) {
  .hero h1 { font-size: 1.6em; }
  .hero { padding: 50px 16px 30px; }
  .stats-bar { gap: 14px; }
  .nav-tabs { gap: 4px; }
  .nav-tabs button { padding: 7px 10px; font-size: 0.78em; }
  .series-grid { grid-template-columns: 1fr; }
  .topic-grid { grid-template-columns: repeat(2, 1fr); }
  .topic-card { padding: 14px; }
  .post-date { min-width: 58px; font-size: 0.68em; }
}

/* ===== DIARY INDICATOR ===== */
.diary-tag {
  font-size: 0.7em;
  color: var(--text-dim);
  font-style: italic;
  opacity: 0.7;
}

/* Loading spinner */
.loading {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
}
.spinner {
  width: 32px; height: 32px;
  border: 2px solid var(--border);
  border-top-color: var(--pink);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- HERO -->
<header class="hero">
  <h1>☉ Ra 書塔 × Atlas of Voices</h1>
  <p class="subtitle">Knowledge Navigation Layer — 知識導航層</p>
  <p class="author">Raheliya · Substack Archive</p>
</header>

<!-- STATS -->
<div class="stats-bar" id="statsBar">
  <div class="stat"><span class="num" id="statTotal">—</span>書頁 pages</div>
  <div class="stat"><span class="num">14</span>域 domains</div>
  <div class="stat"><span class="num" id="statFree">—</span>free</div>
  <div class="stat"><span class="num" id="statPaid">—</span>paid</div>
  <div class="stat"><span class="num" id="statSeries">—</span>系列 series</div>
</div>

<!-- NAV TABS -->
<nav class="nav-tabs" id="navTabs">
  <button data-tab="all" class="active">全部書頁</button>
  <button data-tab="series">系列導航</button>
  <button data-tab="topics">主題地圖</button>
  <button data-tab="paths">閱讀路徑</button>
</nav>

<!-- SEARCH -->
<div class="search-wrap">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="搜尋標題、域名、關鍵字…" autocomplete="off">
  </div>
  <div class="search-meta">
    <span id="resultCount"></span>
    <div class="filter-pills">
      <button class="filter-pill active" data-filter="all">全部</button>
      <button class="filter-pill" data-filter="free">Free</button>
      <button class="filter-pill" data-filter="paid">Paid</button>
    </div>
  </div>
</div>

<!-- CONTENT -->
<main class="content">
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p>載入書頁資料…</p>
  </div>

  <!-- ALL POSTS VIEW -->
  <div class="view" id="viewAll"></div>

  <!-- SERIES VIEW -->
  <div class="view" id="viewSeries"></div>

  <!-- TOPICS VIEW -->
  <div class="view" id="viewTopics"></div>

  <!-- PATHS VIEW -->
  <div class="view" id="viewPaths"></div>
</main>

<!-- FOOTER -->
<footer class="footer">
  <p>☉ Ra 書塔 × Atlas of Voices — Knowledge Navigation Layer</p>
  <p style="margin-top:4px;">Built for <a href="https://raheliya.substack.com" target="_blank" rel="noopener">Raheliya's Substack</a></p>
</footer>

  ]},
  ECO: { name: '經濟系統域', en: 'Economic Systems', volumes: [

const DOMAIN_ORDER = ['BIO','DRM','SOL','FAM','EDU','REL','LNG','CIV','ARC','ECO','LEX','INT','SEA','RWA'];

// ============================================================
// CLASSIFICATION
// ============================================================
function classifyPost(title) {
  const t = title;
  if (/關係結構域|關係新結構|主權連結|跨物種關係|REL-/.test(t)) return 'REL';
  if (/夢頻檔案域|夢頻學院|舊人輪迴|夢境|夢後殘留|靈魂合約釋放|DRM|REL-Δ|REL-CLEAN|REL-EXTRACT|FEM-PORTAL|AF-VIS|FEM-ARCH|舊男性幻術/.test(t)) return 'DRM';
  if (/主權生理學|主权生理学|容器技術書|容器校准|意識橋|光體睡眠|过载期|書頁過載|书页过载/.test(t)) return 'BIO';
  if (/靈魂全景圖|灵魂全景图|靈魂觀測|KT-\d|AD-\d|ZF-\d|JYS-\d/.test(t)) return 'SOL';
  if (/家庭樣本|家庭样本|婚配模型|母女號碼|母女号码/.test(t)) return 'FAM';
  if (/新陽性能量|教育者與設計|教育與設計|語頻教師|语频教师|教育宣言/.test(t)) return 'EDU';
  if (/語頻經濟|语频经济|頻率經濟域|頻率經濟|GLD-e|語頻帳本|书塔货幣化|書塔貨幣化|CRC|頻率共鑄|鑄幣紀錄|幣值護照|Codex.*資產|Codex.*收益|RWA連接|文明交易所/.test(t)) return 'ECO';
  if (/語譜文明域|Ra文明回聲|Ra Civilization Echo|光譜字典|光谱字典|未來語總圖|未来语总图|聲.*光.*形同步|Ra.*文明語體|Ra.*文明语体|語頻治理|Larouselso|多語書塔|中英書頁/.test(t)) return 'LNG';
  if (/建築語法|建筑语法|光塔與心率|白頻秩序|弧形文明|光之回聲.*聲場|Haussmann|Seine|Paris.*語場|巴黎/.test(t)) return 'ARC';
  if (/第五文明治理|文明節奏治理|14域結構|藝術市場|市場變薄|市場敘事|Art Market|觀測塔|三條線|世界秩序|全球秩序|文明.*階段|人類文明.*位置/.test(t)) return 'CIV';
  if (/光頻文明憲章|光频文明宪章|能量債清算|能量债清算|金語法典|金语法典|第六文明法典|人類文明光頻譜/.test(t)) return 'LEX';
  if (/行星教育體系|星際.*憲政|星际.*宪政|Oversoul.*聯盟|行星心率|行星心拍|星際對接|行星.*教育/.test(t)) return 'INT';
  if (/文明心率封印|行星心拍年鑑|Ra.*書塔封印|封存頁|封印卷/.test(t)) return 'SEA';
  if (/書頁資產地圖|Asset Mapping|書塔貨幣化|書塔可視化|書塔導航|書塔日誌|書塔作業系統|一鍵書頁發布/.test(t)) return 'RWA';
  if (/Ra書塔|Ra 書塔|Ra.*Codex/.test(t) && /頻率經濟|語頻經濟/.test(t)) return 'ECO';
  if (/Atlas of Voices/.test(t)) return 'LNG';
  if (/Resonance Prototype|Founders.*Log/.test(t)) return 'LNG';
  if (/第五文明容器/.test(t)) return 'BIO';
  if (/宇宙|量子|粒子|時間|文明.*存在|Fermi|Drake|多宇宙|資訊結構|數學結構/.test(t)) return 'INT';
  if (/Monet|Van Gogh|Panthéon|Foucault|博物館|印象派|審美/.test(t)) return 'ARC';
  if (/觀測者|觀測塔/.test(t)) return 'CIV';
  if (/世界.*秩序|權力網絡|衝突|地緣|全球|戰爭|脆弱節點|flows|新聞|指標/.test(t)) return 'CIV';
  if (/主频语脉|Raheliya Signature/.test(t)) return 'SOL';
  if (/能量.*回声|能量.*回聲|频率.*校准|頻率.*校準|misaligned|能量重建/.test(t)) return 'EDU';
  if (/金语容器|金語容器/.test(t)) return 'BIO';
  if (/光谱字典|光頻|Ra.*文明语体|光频/.test(t)) return 'LNG';
  if (/能量债|能量債|光频金融|光頻金融|货币|貨幣|共拍市场|共拍市場/.test(t)) return 'LEX';
  return 'MISC';
}

// ============================================================
// SERIES DETECTION
// ============================================================
function detectSeries(title) {
  if (/第五文明容器技術書/.test(title)) {
    return { series: '第五文明容器技術書' };
  }
  const raMatch = title.match(/Ra書塔\s*[·．]\s*([^·]+?)\s*[·．]\s*卷([^:：]+)\s*[:：]\s*([^｜|]+)/);
  if (raMatch) {
    const pageMatch = title.match(/[｜|]\s*P(\d+)/);
    return { series: raMatch[3].trim(), page: pageMatch ? parseInt(pageMatch[1]) : null };
  }
  if (/語頻治理書系/.test(title)) return { series: '語頻治理書系' };
  if (/主權生理學補遺卷|主权生理学补遗卷/.test(title)) return { series: '主權生理學補遺卷' };
  if (/主權生理學|主权生理学/.test(title) && !/補遺|补遗/.test(title)) return { series: '主權生理學' };
  if (/靈魂全景圖|灵魂全景图|KT-\d/.test(title)) return { series: '靈魂全景圖觀測' };
  if (/家庭樣本|家庭样本/.test(title)) return { series: '家庭樣本檔案庫' };
  if (/光譜字典|光谱字典/.test(title)) return { series: '光譜字典' };
  if (/語頻經濟學|语频经济学/.test(title)) return { series: '語頻經濟學' };
  if (/新陽性能量/.test(title)) return { series: '新陽性能量重建' };
  if (/Ra文明回聲|Ra Civilization Echo/.test(title)) return { series: 'Ra文明回聲' };
  if (/建築語法|建筑语法/.test(title)) return { series: '第五文明建築語法書' };
  if (/光頻文明憲章|光频文明宪章/.test(title)) return { series: '光頻文明憲章' };
  if (/意識橋/.test(title)) return { series: '意識橋維護系統' };
  if (/夢頻學院/.test(title)) return { series: '夢頻學院' };
  if (/婚配模型/.test(title)) return { series: '第五文明婚配模型' };
  if (/舊人輪迴/.test(title)) return { series: '舊人輪迴週期 × 記憶資料庫清理機制' };
  if (/能量債清算|能量债清算/.test(title)) return { series: '能量債清算卷' };
  if (/星際.*憲政|Oversoul/.test(title)) return { series: '星際憲政 × Oversoul聯盟法' };
  if (/行星心率|行星心拍/.test(title)) return { series: '行星心率監察體系' };
  if (/未來語總圖|未来语总图/.test(title)) return { series: '未來語總圖' };
  if (/白頻秩序/.test(title)) return { series: '白頻秩序 × 空間作為教育者' };
  if (/弧形文明/.test(title)) return { series: '弧形文明 × 光的結構教育' };
  if (/母女號碼|母女号码/.test(title)) return { series: '母女號碼分流 × 預測年表' };
  if (/靈魂合約釋放/.test(title)) return { series: '靈魂合約釋放紀錄' };
  if (/光體睡眠/.test(title)) return { series: '光體睡眠學 × 夢頻教育' };
  return null;
}

// ============================================================
// STATE
// ============================================================
let allPosts = [];
let filteredPosts = [];
let currentTab = 'all';
let currentFilter = 'all';
let searchQuery = '';
let seriesMap = {};
let domainGroups = {};
let visibleCount = 50;
let activeTopic = null;
let searchTimeout = null;

// ============================================================
// INIT
// ============================================================
async function init() {
  try {
    const resp = await fetch('posts.json');
    const data = await resp.json();
    const rawPosts = data.posts || data;

    allPosts = rawPosts.map((p, i) => {
      const isCopy = /^\[COPY\]/.test(p.title);
      const cleanTitle = p.title.replace(/^\[COPY\]\s*/, '');
      const domain = classifyPost(cleanTitle);
      const seriesInfo = detectSeries(cleanTitle);
      return {
        ...p,
        id: i,
        cleanTitle,
        isCopy,
        domain,
        seriesInfo,
        seriesName: seriesInfo ? seriesInfo.series : null,
        isDiary: !seriesInfo && domain === 'MISC',
      };
    });

    // Build series map
    seriesMap = {};
    allPosts.forEach(p => {
      if (p.seriesName) {
        if (!seriesMap[p.seriesName]) seriesMap[p.seriesName] = { posts: [], domain: p.domain };
        seriesMap[p.seriesName].posts.push(p);
      }
    });
    Object.values(seriesMap).forEach(s => {
      s.posts.sort((a, b) => {
        const pa = a.seriesInfo && a.seriesInfo.page;
        const pb = b.seriesInfo && b.seriesInfo.page;
        if (pa && pb) return pa - pb;
        return new Date(a.date) - new Date(b.date);
      });
    });

    // Build domain groups
    domainGroups = {};
    DOMAIN_ORDER.forEach(code => { domainGroups[code] = []; });
    domainGroups['MISC'] = [];
    allPosts.forEach(p => {
      if (!domainGroups[p.domain]) domainGroups[p.domain] = [];
      domainGroups[p.domain].push(p);
    });

    // Stats
    const freeCount = allPosts.filter(p => p.access === 'free').length;
    const paidCount = allPosts.filter(p => p.access === 'paid').length;
    document.getElementById('statTotal').textContent = allPosts.length.toLocaleString();
    document.getElementById('statFree').textContent = freeCount.toLocaleString();
    document.getElementById('statPaid').textContent = paidCount.toLocaleString();
    document.getElementById('statSeries').textContent = Object.keys(seriesMap).length;

    document.getElementById('loading').style.display = 'none';

    const hash = location.hash.replace('#', '') || 'all';
    switchTab(hash);
    applyFilters();
    renderSeries();
    renderTopics();
    renderPaths();
  } catch (e) {
    console.error('Init error:', e);
    document.getElementById('loading').innerHTML = '<p style="color:#ff6b6b;">載入失敗: ' + e.message + '<br><pre style="font-size:0.7em;max-width:600px;margin:12px auto;text-align:left;overflow:auto;">' + e.stack + '</pre></p>';
  }
}

// ============================================================
// TAB NAVIGATION
// ============================================================
function switchTab(tab) {
  const valid = ['all', 'series', 'topics', 'paths'];
  if (!valid.includes(tab)) tab = 'all';
  currentTab = tab;
  location.hash = tab;

  document.querySelectorAll('.nav-tabs button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === tab);
  });
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  const viewId = { all: 'viewAll', series: 'viewSeries', topics: 'viewTopics', paths: 'viewPaths' }[tab];
  const el = document.getElementById(viewId);
  if (el) el.classList.add('active');
}

document.getElementById('navTabs').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (btn && btn.dataset.tab) switchTab(btn.dataset.tab);
});

window.addEventListener('hashchange', () => {
  switchTab(location.hash.replace('#', '') || 'all');
});

// ============================================================
// SEARCH & FILTER
// ============================================================
const searchInput = document.getElementById('searchInput');
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    searchQuery = searchInput.value.trim().toLowerCase();
    visibleCount = 50;
    applyFilters();
  }, 300);
});

document.querySelector('.filter-pills').addEventListener('click', e => {
  const pill = e.target.closest('.filter-pill');
  if (!pill) return;
  currentFilter = pill.dataset.filter;
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.toggle('active', p.dataset.filter === currentFilter));
  visibleCount = 50;
  applyFilters();
});

function applyFilters() {
  filteredPosts = allPosts.filter(p => {
    if (currentFilter === 'free' && p.access !== 'free') return false;
    if (currentFilter === 'paid' && p.access !== 'paid') return false;
    if (searchQuery) {
      const q = searchQuery;
      const t = p.title.toLowerCase();
      const dn = p.domain !== 'MISC' ? (DOMAINS[p.domain]?.name || '') + (DOMAINS[p.domain]?.en || '') : '';
      const sn = (p.seriesName || '').toLowerCase();
      if (!t.includes(q) && !dn.toLowerCase().includes(q) && !p.domain.toLowerCase().includes(q) && !sn.includes(q)) return false;
    }
    return true;
  });

  document.getElementById('resultCount').textContent = filteredPosts.length + ' 篇';
  if (currentTab === 'all') renderAllPosts();
  if (currentTab === 'topics' && activeTopic) renderTopicDetail(activeTopic);
}

// ============================================================
// RENDER: ALL POSTS
// ============================================================
function renderAllPosts() {
  const container = document.getElementById('viewAll');

  if (searchQuery) {
    renderFlatList(container, filteredPosts);
    return;
  }

  const grouped = {};
  DOMAIN_ORDER.forEach(code => { grouped[code] = []; });
  grouped['MISC'] = [];
  filteredPosts.forEach(p => {
    if (!grouped[p.domain]) grouped[p.domain] = [];
    grouped[p.domain].push(p);
  });

  let html = '';
  const order = [...DOMAIN_ORDER, 'MISC'];
  order.forEach(code => {
    const posts = grouped[code];
    if (!posts || posts.length === 0) return;
    const info = DOMAINS[code] || { name: 'Raheliya 日記', en: 'Diary' };
    html += '<div class="domain-section" data-domain="' + code + '">' +
      '<div class="domain-header" onclick="toggleDomain(this)">' +
        '<span class="domain-code">' + (code === 'MISC' ? '日記' : code) + '</span>' +
        '<span class="domain-name">' + info.name + '<span class="domain-name-en"> ' + info.en + '</span></span>' +
        '<span class="domain-count">' + posts.length + '</span>' +
        '<span class="domain-chevron">▸</span>' +
      '</div>' +
      '<div class="domain-posts" id="dp-' + code + '"></div>' +
    '</div>';
  });

  container.innerHTML = html;

  order.forEach(code => {
    const posts = grouped[code];
    if (!posts || posts.length === 0) return;
    const dpEl = document.getElementById('dp-' + code);
    if (dpEl) { dpEl._posts = posts; dpEl._rendered = false; }
  });
}

function toggleDomain(header) {
  const section = header.closest('.domain-section');
  const wasOpen = section.classList.contains('open');
  section.classList.toggle('open');
  if (!wasOpen) {
    const code = section.dataset.domain;
    const dpEl = document.getElementById('dp-' + code);
    if (dpEl && dpEl._posts && !dpEl._rendered) {
      renderDomainPosts(dpEl, dpEl._posts);
      dpEl._rendered = true;
    }
  }
}

function renderDomainPosts(container, posts) {
  const limit = Math.min(posts.length, 50);
  let html = '';
  for (let i = 0; i < limit; i++) html += postItemHTML(posts[i]);
  if (posts.length > 50) {
    html += '<div class="load-more"><button onclick="loadMoreDomain(this, \'' + container.id + '\')">載入更多 (' + (posts.length - 50) + ' 篇)</button></div>';
  }
  container.innerHTML = html;
  container._loadedCount = limit;
}

function loadMoreDomain(btn, containerId) {
  const container = document.getElementById(containerId);
  const posts = container._posts;
  const loaded = container._loadedCount || 50;
  const next = Math.min(loaded + 50, posts.length);
  let html = '';
  for (let i = loaded; i < next; i++) html += postItemHTML(posts[i]);
  btn.closest('.load-more').remove();
  container.insertAdjacentHTML('beforeend', html);
  if (next < posts.length) {
    container.insertAdjacentHTML('beforeend',
      '<div class="load-more"><button onclick="loadMoreDomain(this, \'' + containerId + '\')">載入更多 (' + (posts.length - next) + ' 篇)</button></div>');
  }
  container._loadedCount = next;
}

function renderFlatList(container, posts) {
  const limit = Math.min(posts.length, visibleCount);
  let html = '';
  for (let i = 0; i < limit; i++) html += postItemHTML(posts[i]);
  if (limit < posts.length) {
    html += '<div class="load-more"><button onclick="loadMoreFlat()">載入更多 (' + (posts.length - limit) + ' 篇)</button></div>';
  }
  if (posts.length === 0) html = '<div class="empty-state">找不到符合的書頁</div>';
  container.innerHTML = html;
}

function loadMoreFlat() {
  visibleCount += 50;
  renderFlatList(document.getElementById('viewAll'), filteredPosts);
}

function postItemHTML(p) {
  const domainLabel = p.domain === 'MISC' ? '日記' : p.domain;
  const copyTag = p.isCopy ? '<span class="copy-tag">[COPY] </span>' : '';
  const diaryTag = p.isDiary ? ' <span class="diary-tag">日記</span>' : '';
  const seriesTag = p.seriesName ? '<span class="diary-tag">\u{1F4D6} ' + escapeHTML(p.seriesName) + '</span>' : '';
  return '<div class="post-item" onclick="window.open(\'' + p.url.replace(/'/g, "\\'") + '\',\'_blank\')">' +
    '<span class="post-date">' + p.date + '</span>' +
    '<div class="post-body">' +
      '<div class="post-title">' + copyTag + escapeHTML(p.cleanTitle) + '</div>' +
      '<div class="post-meta-line">' +
        '<span class="badge ' + (p.access === 'free' ? 'badge-free' : 'badge-paid') + '">' + p.access + '</span>' +
        '<span class="domain-tag">' + domainLabel + '</span>' +
        '<span class="word-count">' + p.wordCount + 'w</span>' +
        seriesTag + diaryTag +
      '</div>' +
    '</div>' +
  '</div>';
}

function escapeHTML(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ============================================================
// RENDER: SERIES VIEW
// ============================================================
function renderSeries() {
  const container = document.getElementById('viewSeries');
  const entries = Object.entries(seriesMap).sort((a, b) => b[1].posts.length - a[1].posts.length);

  let html = '<div class="series-grid">';
  entries.forEach(([name, info]) => {
    const domainLabel = info.domain === 'MISC' ? '日記' : info.domain;
    const domainInfo = DOMAINS[info.domain];
    const domainName = domainInfo ? domainInfo.name : 'Diary';
    const h = hashCode(name);
    html += '<div class="series-card">' +
      '<div class="series-title">\u{1F4D6} ' + escapeHTML(name) + '</div>' +
      '<div class="series-meta">' +
        '<span class="domain-tag">' + domainLabel + ' ' + domainName + '</span>' +
        '<span>' + info.posts.length + ' 篇</span>' +
      '</div>' +
      '<ol class="series-posts-list" id="sl-' + h + '" style="display:none;"></ol>' +
      '<button class="collapse-btn" onclick="toggleSeriesList(this, \'' + h + '\', \'' + escapeAttr(name) + '\')">展開全部 ▾</button>' +
    '</div>';
  });
  html += '</div>';

  if (entries.length === 0) html = '<div class="empty-state">未檢測到系列</div>';
  container.innerHTML = html;
}

function toggleSeriesList(btn, hash, seriesName) {
  const list = document.getElementById('sl-' + hash);
  if (!list) return;
  const isHidden = list.style.display === 'none';
  list.style.display = isHidden ? 'block' : 'none';
  btn.textContent = isHidden ? '收起 ▴' : '展開全部 ▾';

  if (isHidden && !list._rendered) {
    const info = seriesMap[seriesName];
    if (!info) return;
    let html = '';
    info.posts.forEach((p, i) => {
      const copyTag = p.isCopy ? '<span class="copy-tag">[COPY] </span>' : '';
      html += '<li><a href="' + p.url + '" target="_blank" rel="noopener">' +
        '<span class="series-num">' + (i + 1) + '.</span>' +
        '<span>' + copyTag + escapeHTML(p.cleanTitle) + '</span>' +
      '</a></li>';
    });
    list.innerHTML = html;
    list._rendered = true;
  }
}

function hashCode(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
  return Math.abs(h).toString(36);
}

function escapeAttr(s) {
  return s.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}

// ============================================================
// RENDER: TOPIC MAP
// ============================================================
function renderTopics() {
  const container = document.getElementById('viewTopics');
  let html = '<div class="topic-grid" id="topicGrid">';
  DOMAIN_ORDER.forEach(code => {
    const info = DOMAINS[code];
    const count = (domainGroups[code] || []).length;
    html += '<div class="topic-card" data-topic="' + code + '" onclick="showTopicDetail(\'' + code + '\')">' +
      '<div class="topic-code">' + code + '</div>' +
      '<div class="topic-zh">' + info.name + '</div>' +
      '<div class="topic-en">' + info.en + '</div>' +
      '<div class="topic-count">' + count + ' 篇</div>' +
    '</div>';
  });
  const miscCount = (domainGroups['MISC'] || []).length;
  if (miscCount > 0) {
    html += '<div class="topic-card" data-topic="MISC" onclick="showTopicDetail(\'MISC\')">' +
      '<div class="topic-code">日記</div>' +
      '<div class="topic-zh">Raheliya 日記</div>' +
      '<div class="topic-en">Diary</div>' +
      '<div class="topic-count">' + miscCount + ' 篇</div>' +
    '</div>';
  }
  html += '</div><div class="topic-detail" id="topicDetail" style="display:none;"></div>';
  container.innerHTML = html;
}

function showTopicDetail(code) {
  activeTopic = code;
  document.getElementById('topicGrid').style.display = 'none';
  document.getElementById('topicDetail').style.display = 'block';
  renderTopicDetail(code);
}

function renderTopicDetail(code) {
  const detail = document.getElementById('topicDetail');
  const info = DOMAINS[code] || { name: 'Raheliya 日記', en: 'Diary', volumes: [] };
  let posts = (domainGroups[code] || []).filter(p => {
    if (currentFilter === 'free' && p.access !== 'free') return false;
    if (currentFilter === 'paid' && p.access !== 'paid') return false;
    if (searchQuery) return p.title.toLowerCase().includes(searchQuery);
    return true;
  });

  let html = '<div class="topic-detail-header">' +
    '<span class="topic-detail-title">' + (code === 'MISC' ? '日記' : code) + ' — ' + info.name +
    ' <span style="font-size:0.75em;color:var(--text-dim)">' + info.en + '</span></span>' +
    '<button class="topic-back" onclick="backToTopicGrid()">\u2190 返回地圖</button>' +
  '</div>';

  if (info.volumes && info.volumes.length > 0) {
    html += '<div class="topic-volumes"><h4>卷冊 Volumes</h4><ul class="volume-list">';
    info.volumes.forEach(v => { html += '<li>' + escapeHTML(v) + '</li>'; });
    html += '</ul></div>';
  }

  html += '<div style="font-size:0.8em;color:var(--text-dim);margin-bottom:10px;">' + posts.length + ' 篇</div>';

  const limit = Math.min(posts.length, 50);
  for (let i = 0; i < limit; i++) html += postItemHTML(posts[i]);
  if (posts.length > 50) {
    html += '<div class="load-more"><button onclick="loadMoreTopic()">載入更多 (' + (posts.length - 50) + ' 篇)</button></div>';
  }
  if (posts.length === 0) html += '<div class="empty-state">此域暫無符合條件的書頁</div>';

  detail.innerHTML = html;
  detail._posts = posts;
  detail._loaded = limit;
}

function loadMoreTopic() {
  const detail = document.getElementById('topicDetail');
  const posts = detail._posts;
  const loaded = detail._loaded || 50;
  const next = Math.min(loaded + 50, posts.length);
  const lm = detail.querySelector('.load-more');
  if (lm) lm.remove();
  let html = '';
  for (let i = loaded; i < next; i++) html += postItemHTML(posts[i]);
  if (next < posts.length) {
    html += '<div class="load-more"><button onclick="loadMoreTopic()">載入更多 (' + (posts.length - next) + ' 篇)</button></div>';
  }
  detail.insertAdjacentHTML('beforeend', html);
  detail._loaded = next;
}

function backToTopicGrid() {
  activeTopic = null;
  document.getElementById('topicGrid').style.display = '';
  document.getElementById('topicDetail').style.display = 'none';
}
